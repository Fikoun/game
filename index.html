<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Radegastův odkaz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e14;
  --bg-2: #131722;
  --ink: #eadfc5;
  --ink-dim: #8c7d5e;
  --ink-faint: #4a3f30;
  --ember: #e8a04e;
  --ember-bright: #ffc878;
  --gold: #f3d57f;
  --moss: #b9963c;
  --crimson: #c4533a;
  --moonlight: #6a8caf;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'EB Garamond', Georgia, serif;
  overflow: hidden;
  overscroll-behavior: none;
}
body {
  display: flex;
  flex-direction: column;
  position: relative;
  background:
    radial-gradient(ellipse 90% 60% at 50% 40%, rgba(232,160,78,0.09), transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(106,140,175,0.07), transparent 70%),
    radial-gradient(ellipse at 20% 90%, rgba(196,83,58,0.05), transparent 70%),
    var(--bg);
  min-height: 100dvh;
  height: 100dvh;
}
body::after {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
  mix-blend-mode: overlay;
  opacity: 0.35;
  z-index: 1;
}

.embers {
  position: fixed; inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 2;
}
.ember-particle {
  position: absolute;
  bottom: -12px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--ember-bright), var(--ember) 40%, transparent 70%);
  filter: blur(0.4px);
  opacity: 0;
  animation: rise linear infinite;
}
@keyframes rise {
  0%   { transform: translate3d(0,0,0); opacity: 0; }
  10%  { opacity: 0.9; }
  85%  { opacity: 0.5; }
  100% { transform: translate3d(var(--dx,30px), -110vh, 0); opacity: 0; }
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 1rem 1.1rem 0;
  position: relative;
  z-index: 5;
  gap: 1rem;
}
.brand {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  font-size: clamp(1.05rem, 4vw, 1.45rem);
  letter-spacing: 0.06em;
  color: var(--gold);
  text-shadow: 0 0 24px rgba(243,213,127,0.3);
  line-height: 1.1;
}
.brand small {
  display: block;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 0.72rem;
  color: var(--ink-dim);
  letter-spacing: 0.08em;
  margin-top: 0.15rem;
  font-weight: normal;
}
.player {
  text-align: right;
  flex-shrink: 0;
  max-width: 50%;
}
.help-btn {
  background: transparent;
  border: 1px solid rgba(232,160,78,0.45);
  color: var(--ember);
  width: 2rem; height: 2rem;
  border-radius: 50%;
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  margin-left: 0.6rem;
  flex-shrink: 0;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  padding: 0;
}
.help-btn:hover, .help-btn:focus {
  background: rgba(232,160,78,0.15);
  color: var(--ember-bright);
  outline: none;
}
.help-modal {
  position: fixed;
  z-index: 25;
  top: 50%; left: 50%;
  transform: translate(-50%, -45%) scale(0.94);
  width: min(92vw, 400px);
  background: linear-gradient(180deg, rgba(34,26,18,0.97), rgba(15,12,9,0.97));
  border: 1px solid rgba(232,160,78,0.45);
  border-radius: 14px;
  padding: 1.3rem 1.2rem 1.1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s, transform 0.4s cubic-bezier(0.2,0.8,0.3,1.25);
  box-shadow:
    0 30px 80px rgba(0,0,0,0.65),
    inset 0 0 60px rgba(232,160,78,0.07),
    0 0 80px rgba(232,160,78,0.22);
}
.help-modal.open {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}
.help-modal h2 {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.05rem;
  color: var(--gold);
  margin: 0 0 0.9rem;
  text-align: center;
  letter-spacing: 0.04em;
}
.help-section {
  margin-bottom: 1.1rem;
}
.help-section:last-child { margin-bottom: 0.3rem; }
.help-label {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.6rem;
  letter-spacing: 0.32em;
  color: var(--ember);
  text-transform: uppercase;
  margin-bottom: 0.45rem;
}
.help-text {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 0.92rem;
  color: var(--ink-dim);
  line-height: 1.4;
  margin: 0 0 0.6rem;
}
.help-call {
  display: block;
  text-align: center;
  text-decoration: none;
  background: var(--crimson);
  color: #fff;
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1rem;
  border-radius: 8px;
  transition: background 0.2s, transform 0.1s;
}
.help-call:hover { background: #d96045; }
.help-call:active { transform: scale(0.98); }
.code-form {
  display: flex;
  gap: 0.5rem;
}
.code-input {
  flex: 1;
  background: rgba(11,14,20,0.7);
  border: 1px solid rgba(232,160,78,0.3);
  color: var(--ink);
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.4rem;
  letter-spacing: 0.4em;
  text-align: center;
  padding: 0.55rem 0.4rem;
  border-radius: 6px;
  width: 100%;
  min-width: 0;
}
.code-input:focus {
  outline: none;
  border-color: var(--ember);
  background: rgba(11,14,20,0.9);
}
.code-submit {
  background: var(--ember);
  color: var(--bg);
  border: none;
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  padding: 0 1rem;
  border-radius: 6px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.2s;
  flex-shrink: 0;
}
.code-submit:hover { background: var(--ember-bright); }
.help-close {
  display: block;
  margin: 0.9rem auto 0;
  background: transparent;
  border: none;
  color: var(--ink-faint);
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  cursor: pointer;
}
.help-close:hover { color: var(--ink-dim); }
.player .label {
  display: block;
  font-size: 0.65rem;
  color: var(--ink-dim);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 0.15rem;
}
.player .name {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 400;
  font-size: clamp(0.85rem, 3vw, 1rem);
  color: var(--ember);
  letter-spacing: 0.02em;
  display: inline-block;
  line-height: 1.2;
  text-align: right;
  word-wrap: break-word;
}

.stage {
  flex: 1;
  position: relative;
  display: grid;
  place-items: center;
  z-index: 5;
  min-height: 0;
  padding: 0.4rem 0.5rem;
}
.heptagon-wrap {
  position: relative;
  width: min(94vw, 72vh);
  max-width: 580px;
  aspect-ratio: 1;
}
.heptagon-svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}
.center-readout {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  pointer-events: none;
}
.center-readout .inner {
  text-align: center;
  transform: translateY(-3%);
}
.center-readout .big {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 900;
  font-size: clamp(3rem, 13vw, 4.8rem);
  color: var(--gold);
  line-height: 1;
  text-shadow:
    0 0 24px rgba(243,213,127,0.45),
    0 0 60px rgba(232,160,78,0.18);
  transition: transform 0.4s cubic-bezier(0.2,0.7,0.3,1.4);
}
.center-readout .big.bump { transform: scale(1.18); }
.center-readout .of {
  display: block;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(0.85rem, 2.4vw, 1.05rem);
  color: var(--ink-dim);
  margin-top: 0.15rem;
  letter-spacing: 0.04em;
}
.center-readout .caption {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(0.6rem, 1.9vw, 0.75rem);
  color: var(--ink-faint);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  margin-top: 0.5rem;
}

.hep-edge {
  fill: none;
  stroke: rgba(232,160,78,0.18);
  stroke-width: 1;
  stroke-dasharray: 3 4;
  transition: stroke 0.6s, stroke-width 0.6s, stroke-dasharray 0.6s;
}
.hep-edge.lit {
  stroke: var(--ember);
  stroke-width: 2;
  stroke-dasharray: none;
  filter: drop-shadow(0 0 5px rgba(232,160,78,0.7));
}

.node-bg {
  fill: rgba(11,14,20,0.92);
  stroke: var(--ember);
  stroke-width: 1.5;
  stroke-opacity: 0.45;
  transition: fill 0.5s, stroke 0.5s, stroke-opacity 0.5s, filter 0.5s;
}
.node-num {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  font-size: 24px;
  fill: var(--ink-dim);
  text-anchor: middle;
  dominant-baseline: central;
  user-select: none;
  transition: fill 0.5s;
}
.node-pulse {
  fill: none;
  stroke: var(--ember);
  stroke-width: 1;
  stroke-opacity: 0.25;
  animation: pulse 3.4s ease-in-out infinite;
  transform-origin: center;
  transform-box: fill-box;
}
@keyframes pulse {
  0%, 100% { stroke-opacity: 0.12; transform: scale(0.95); }
  50%      { stroke-opacity: 0.45; transform: scale(1.1); }
}
.node.done .node-bg {
  fill: var(--ember);
  stroke: var(--ember-bright);
  stroke-opacity: 1;
  filter: drop-shadow(0 0 14px rgba(232,160,78,0.7));
}
.node.done .node-num { fill: var(--bg); }
.node.done .node-pulse { display: none; }

.star-bg {
  fill: rgba(11,14,20,0.92);
  stroke: var(--gold);
  stroke-width: 1.5;
  stroke-opacity: 0.55;
  transition: fill 0.5s, stroke 0.5s, stroke-opacity 0.5s, filter 0.5s;
}
.star-aura {
  fill: var(--gold);
  opacity: 0.07;
  filter: blur(8px);
  transform-origin: center;
  transform-box: fill-box;
  animation: starHalo 4.2s ease-in-out infinite;
}
@keyframes starHalo {
  0%, 100% { opacity: 0.07; transform: scale(0.95); }
  50%      { opacity: 0.18; transform: scale(1.1); }
}
.node.star .node-num { fill: var(--gold); font-size: 22px; }
.node.star.done .star-bg {
  fill: var(--gold);
  stroke: #fff6d4;
  stroke-opacity: 1;
  filter: drop-shadow(0 0 22px rgba(243,213,127,0.85));
}
.node.star.done .node-num { fill: var(--bg); }
.node.star.done .star-aura { opacity: 0.32; animation-duration: 2.1s; }

.ring-pulse {
  fill: none;
  stroke-width: 2;
  transform-origin: center;
  transform-box: fill-box;
  animation: ringPulse 0.95s ease-out forwards;
}
@keyframes ringPulse {
  0%   { transform: scale(1);   opacity: 1; }
  100% { transform: scale(3.6); opacity: 0; }
}

.footbar {
  display: flex;
  justify-content: center;
  padding: 0.4rem 1.25rem max(0.9rem, env(safe-area-inset-bottom));
  position: relative;
  z-index: 5;
}
.reset-btn {
  background: transparent;
  border: none;
  color: var(--ink-faint);
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  padding: 0.4rem 1rem;
  cursor: pointer;
  transition: color 0.2s, letter-spacing 0.2s;
}
.reset-btn:hover { color: var(--ink-dim); letter-spacing: 0.18em; }

.flash-backdrop {
  position: fixed; inset: 0;
  background: rgba(11,14,20,0.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.flash-backdrop.open { opacity: 1; pointer-events: auto; }

.flashcard {
  position: fixed;
  z-index: 25;
  top: 50%; left: 50%;
  transform: translate(-50%, -45%) scale(0.94);
  width: min(90vw, 380px);
  background: linear-gradient(180deg, rgba(34,26,18,0.97), rgba(15,12,9,0.97));
  border: 1px solid rgba(232,160,78,0.45);
  border-radius: 14px;
  padding: 1.5rem 1.3rem 1.2rem;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s, transform 0.5s cubic-bezier(0.2,0.8,0.3,1.25);
  box-shadow:
    0 30px 80px rgba(0,0,0,0.65),
    inset 0 0 60px rgba(232,160,78,0.07),
    0 0 80px rgba(232,160,78,0.22);
  cursor: pointer;
}
.flashcard.open {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}
.flashcard.final {
  border-color: rgba(243,213,127,0.75);
  background: linear-gradient(180deg, rgba(46,32,18,0.97), rgba(20,14,10,0.97));
  box-shadow:
    0 30px 80px rgba(0,0,0,0.65),
    inset 0 0 100px rgba(243,213,127,0.1),
    0 0 140px rgba(243,213,127,0.35);
}
.flash-number {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.65rem;
  letter-spacing: 0.36em;
  color: var(--ember);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.flashcard.final .flash-number { color: var(--gold); }
.flash-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.2rem, 4.5vw, 1.45rem);
  color: var(--gold);
  margin-bottom: 0.7rem;
  line-height: 1.2;
}
.flash-body {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(1rem, 3.5vw, 1.08rem);
  color: var(--ink);
  line-height: 1.55;
  margin-bottom: 1rem;
}
.flash-hint {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.58rem;
  letter-spacing: 0.36em;
  color: var(--ink-faint);
  text-transform: uppercase;
}

.burst {
  position: fixed;
  pointer-events: none;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--ember-bright), var(--ember) 40%, transparent 70%);
  z-index: 15;
  animation: burst 0.95s ease-out forwards;
}
@keyframes burst {
  0%   { transform: translate(0,0) scale(1);   opacity: 1; }
  100% { transform: translate(var(--bx), var(--by)) scale(0.15); opacity: 0; }
}

.screen-flash {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 14;
  background: radial-gradient(circle at 50% 55%, rgba(232,160,78,0.28), transparent 60%);
  animation: screenFlash 0.6s ease-out forwards;
}
.screen-flash.final { background: radial-gradient(circle at 50% 55%, rgba(243,213,127,0.4), transparent 65%); }
@keyframes screenFlash {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

.toast {
  position: fixed;
  top: 4.5rem; left: 50%;
  transform: translateX(-50%) translateY(-14px);
  background: rgba(196,83,58,0.95);
  color: #fff;
  padding: 0.55rem 1.1rem;
  border-radius: 6px;
  z-index: 30;
  font-size: 0.92rem;
  letter-spacing: 0.04em;
  opacity: 0;
  transition: opacity 0.35s, transform 0.35s;
  font-family: 'EB Garamond', serif;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-height: 640px) {
  .center-readout .big { font-size: 2.6rem; }
  .topbar { padding: 0.6rem 1rem 0; }
  .center-readout .caption { margin-top: 0.3rem; }
}
</style>
</head>
<body>

<div class="embers" id="embers"></div>

<header class="topbar">
  <div class="brand">Radegastův odkaz<small>noční stezka znamení</small></div>
  <div class="player">
    <span class="label">poutník</span>
    <span class="name" id="playerName">—</span>
  </div>
  <button class="help-btn" id="helpBtn" aria-label="nápověda" title="nápověda">?</button>
</header>

<div class="flash-backdrop" id="helpBackdrop"></div>
<div class="help-modal" id="helpModal" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
  <h2 id="helpTitle">Nápověda strážce</h2>
  <div class="help-section">
    <div class="help-label">v nouzi volej</div>
    <p class="help-text">Ztráta, zranění, nejasná cesta — zavolej okamžitě.</p>
    <a class="help-call" id="helpCall" href="tel:">📞 Zavolat pedagoga</a>
  </div>
  <div class="help-section">
    <div class="help-label">nefunguje NFC?</div>
    <p class="help-text">Zavolej a já ti nadiktuju 4-místný kód stanoviště. Zadej ho sem:</p>
    <form class="code-form" id="codeForm">
      <input class="code-input" id="codeInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" autocomplete="off">
      <button class="code-submit" type="submit">OK</button>
    </form>
  </div>
  <button class="help-close" id="helpClose" type="button">zavřít</button>
</div>

<main class="stage">
  <div class="heptagon-wrap">
    <svg class="heptagon-svg" viewBox="0 0 500 500" preserveAspectRatio="xMidYMid meet" id="heptagonSvg">
      <g id="edges"></g>
      <g id="nodes"></g>
    </svg>
    <div class="center-readout">
      <div class="inner">
        <div class="big" id="bigCount"><span id="count">0</span></div>
        <div class="of">ze sedmi</div>
        <div class="caption">znamení nalezeno</div>
      </div>
    </div>
  </div>
</main>

<footer class="footbar">
  <button class="reset-btn" id="reset">začít znovu</button>
</footer>

<div class="flash-backdrop" id="flashBackdrop"></div>
<div class="flashcard" id="flashcard" role="dialog" aria-modal="true">
  <div class="flash-number" id="flashNumber"></div>
  <div class="flash-title" id="flashTitle"></div>
  <div class="flash-body" id="flashBody"></div>
  <div class="flash-hint">klepni pro pokračování</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  const STATIONS = 7;
  const SK = {
    name: 'radegast:playerName',
    progress: (n) => 'radegast:progress:' + n.toLowerCase().replace(/\s+/g, '_'),
  };

  const TOKENS = {
    '7421': 1,
    '3058': 2,
    '8164': 3,
    '2935': 4,
    '6072': 5,
    '4819': 6,
    '5293': 7,
  };
  const EMERGENCY_TEL = '+420XXXXXXXXX';

  const ADJECTIVES = [
    'Bujarý','Vlasatý','Mlčenlivý','Chytrý','Lstivý','Tajemný','Bezbradý',
    'Smělý','Vousatý','Bosý','Dřímavý','Roztržitý','Bujný','Drsný','Statečný',
    'Mlsný','Plíživý','Hladový','Pochybný','Záhadný','Bručivý','Vzteklý',
    'Spící','Tichý','Brblavý','Loupežný','Smolný','Hloubavý','Mrzutý','Zarputilý'
  ];
  const NOUNS = [
    'Valach','Bača','Vlk','Hřib','Brouk','Smrk','Skřítek','Bohouš','Jurko',
    'Vondra','Mirek','Lojza','Pepa','Hospodář','Pasáček','Strážce','Šepot',
    'Stín','Modřín','Bukáč','Brkoslav','Mech','Pařez','Vincek','Frantík',
    'Houslař','Salašník','Hejkal','Bezdomek','Cimbálník','Ovčák'
  ];
  const LOCATIONS = [
    'z Pusteven','od Radhoště','z Beskyd','ze Soláně','od Vsetína',
    'z Horní Bečvy','od Lysé hory','od Pražma','z Trojanovic','od Rožnova'
  ];

  const STATION_MSG = [
    null,
    { title: 'I. Odbočka do hvozdu',
      body: 'Sejdi z cesty doleva do lesa. Drž se staré kolejnice — vede tě vzhůru zhruba 300 kroků k vrcholu. Nespěchej, znamení nikam neuteče.' },
    { title: 'II. Vrchol kolejnice',
      body: 'Tady kolejnice končí. Ostrá zatáčka doleva a dál po vrstevnici — neklesej, nestoupej, drž horu po pravé ruce.' },
    { title: 'III. Rozcestník strážkyně',
      body: 'U rozcestníku tě čeká kolegyně. Poslechni ji — pošle tě k altánku na úkol a zpět. Bez ní dál nepokračuj.' },
    { title: 'IV. Altánek',
      body: 'Úkol: vyfoť celou skupinku v altánku (foto si nechte, budete ho ukazovat na konci). Pak zpět k rozcestníku — kolegyně vás pošle dolů.' },
    { title: 'V. Dva pařezy',
      body: 'Mírně nahoru — cesta se ukáže, ale fáborky jsou tu trochu zrádné, sleduj je pozorně. POZOR: za chvíli překročíš malý potůček, nešlápni vedle.' },
    { title: 'VI. Doleva dolů',
      body: 'Tady to láme doleva a klesá. Drž se fáborků dolů ke světlině.' },
    { title: 'VII. Nad mýtinou',
      body: 'Mýtina je pod tebou. Sejdi přesně dolů na lesní cestu — tam tě sbírá pedagog.' },
  ];

  const FINAL_MSG = {
    title: 'Poslední úkol',
    body: 'Sejdi na cestu k pedagogovi. Ukaž mu fotku z altánku a vyřkni, kdo byl Radegast — bůh, podle kterého se hora jmenuje. (Nápověda: hojnost, pohostinnost, na Radhošti mu stojí socha.)'
  };

  const rand = (a) => a[Math.floor(Math.random() * a.length)];
  function generateName() {
    let n = rand(ADJECTIVES) + ' ' + rand(NOUNS);
    if (Math.random() < 0.55) n += ' ' + rand(LOCATIONS);
    return n;
  }
  function getOrCreateName() {
    let n = localStorage.getItem(SK.name);
    if (!n) { n = generateName(); localStorage.setItem(SK.name, n); }
    return n;
  }
  function loadProgress(name) {
    try {
      const raw = localStorage.getItem(SK.progress(name));
      return new Set((raw ? JSON.parse(raw) : []).filter(x => typeof x === 'number'));
    } catch { return new Set(); }
  }
  function saveProgress(name, set) {
    localStorage.setItem(SK.progress(name), JSON.stringify([...set]));
  }

  const CX = 250, CY = 250, R = 178;
  const NS = 'http://www.w3.org/2000/svg';
  function angleFor(i) { return (90 - i * (360 / STATIONS)) * Math.PI / 180; }
  function posFor(i) {
    const a = angleFor(i);
    return { x: CX + R * Math.cos(a), y: CY + R * Math.sin(a) };
  }
  function starPath(cx, cy, points, outerR, innerR) {
    const out = [];
    const rot = -Math.PI / 2;
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? outerR : innerR;
      const a = rot + (i * Math.PI) / points;
      out.push((i === 0 ? 'M' : 'L') + (cx + r * Math.cos(a)).toFixed(2) + ',' + (cy + r * Math.sin(a)).toFixed(2));
    }
    out.push('Z');
    return out.join(' ');
  }

  const edgesG = document.getElementById('edges');
  const nodesG = document.getElementById('nodes');

  function buildSvg() {
    edgesG.innerHTML = '';
    nodesG.innerHTML = '';
    for (let i = 1; i <= STATIONS; i++) {
      const from = posFor(i);
      const toIdx = i === STATIONS ? 1 : i + 1;
      const to = posFor(toIdx);
      const line = document.createElementNS(NS, 'line');
      line.setAttribute('x1', from.x.toFixed(2));
      line.setAttribute('y1', from.y.toFixed(2));
      line.setAttribute('x2', to.x.toFixed(2));
      line.setAttribute('y2', to.y.toFixed(2));
      line.setAttribute('class', 'hep-edge');
      line.dataset.from = i;
      line.dataset.to = toIdx;
      edgesG.appendChild(line);
    }
    for (let i = 1; i <= STATIONS; i++) {
      const p = posFor(i);
      const g = document.createElementNS(NS, 'g');
      g.setAttribute('class', 'node' + (i === 7 ? ' star' : ''));
      g.setAttribute('transform', `translate(${p.x.toFixed(2)},${p.y.toFixed(2)})`);
      g.dataset.i = i;
      if (i === 7) {
        const aura = document.createElementNS(NS, 'path');
        aura.setAttribute('class', 'star-aura');
        aura.setAttribute('d', starPath(0, 0, 5, 54, 23));
        g.appendChild(aura);
        const bg = document.createElementNS(NS, 'path');
        bg.setAttribute('class', 'star-bg');
        bg.setAttribute('d', starPath(0, 0, 5, 38, 16));
        g.appendChild(bg);
      } else {
        const pulse = document.createElementNS(NS, 'circle');
        pulse.setAttribute('class', 'node-pulse');
        pulse.setAttribute('r', 30);
        g.appendChild(pulse);
        const bg = document.createElementNS(NS, 'circle');
        bg.setAttribute('class', 'node-bg');
        bg.setAttribute('r', 26);
        g.appendChild(bg);
      }
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('class', 'node-num');
      t.setAttribute('x', 0);
      t.setAttribute('y', i === 7 ? 1 : 0);
      t.textContent = i;
      g.appendChild(t);
      nodesG.appendChild(g);
    }
  }

  let currentName = '';
  let progress = new Set();

  function render() {
    document.getElementById('playerName').textContent = currentName;
    document.getElementById('count').textContent = progress.size;
    document.querySelectorAll('.node').forEach(node => {
      node.classList.toggle('done', progress.has(+node.dataset.i));
    });
    document.querySelectorAll('.hep-edge').forEach(line => {
      const lit = progress.has(+line.dataset.from) && progress.has(+line.dataset.to);
      line.classList.toggle('lit', lit);
    });
  }

  function bumpCount() {
    const el = document.getElementById('bigCount');
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 420);
  }

  function ringPulse(stationIdx) {
    const node = document.querySelector(`.node[data-i="${stationIdx}"]`);
    if (!node) return;
    const ring = document.createElementNS(NS, 'circle');
    ring.setAttribute('cx', 0);
    ring.setAttribute('cy', 0);
    ring.setAttribute('r', stationIdx === 7 ? 34 : 28);
    ring.setAttribute('class', 'ring-pulse');
    ring.setAttribute('stroke', stationIdx === 7 ? '#f3d57f' : '#e8a04e');
    node.appendChild(ring);
    setTimeout(() => ring.remove(), 1000);
  }

  function spawnBurst(cx, cy, count, color) {
    for (let k = 0; k < count; k++) {
      const p = document.createElement('div');
      p.className = 'burst';
      const ang = (Math.PI * 2 * k) / count + (Math.random() - 0.5) * 0.6;
      const dist = 70 + Math.random() * 90;
      p.style.left = (cx - 2.5) + 'px';
      p.style.top = (cy - 2.5) + 'px';
      p.style.setProperty('--bx', (Math.cos(ang) * dist).toFixed(1) + 'px');
      p.style.setProperty('--by', (Math.sin(ang) * dist).toFixed(1) + 'px');
      if (color) p.style.background = `radial-gradient(circle, ${color}, transparent 70%)`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1100);
    }
  }

  function screenFlash(final) {
    const f = document.createElement('div');
    f.className = 'screen-flash' + (final ? ' final' : '');
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 620);
  }

  function nodeScreenCenter(i) {
    const node = document.querySelector(`.node[data-i="${i}"]`);
    if (!node) return null;
    const r = node.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  const flashEl = document.getElementById('flashcard');
  const backdropEl = document.getElementById('flashBackdrop');
  function showFlash(stationIdx, isFinal) {
    const msg = isFinal ? FINAL_MSG : STATION_MSG[stationIdx];
    if (!msg) return;
    document.getElementById('flashNumber').textContent = isFinal
      ? 'odkaz dovršen'
      : 'znamení ' + stationIdx + ' ze sedmi';
    document.getElementById('flashTitle').textContent = msg.title;
    document.getElementById('flashBody').textContent = msg.body;
    flashEl.classList.toggle('final', !!isFinal);
    requestAnimationFrame(() => {
      backdropEl.classList.add('open');
      flashEl.classList.add('open');
    });
  }
  function hideFlash() {
    backdropEl.classList.remove('open');
    flashEl.classList.remove('open');
  }
  backdropEl.addEventListener('click', hideFlash);
  flashEl.addEventListener('click', hideFlash);

  let toastTimer;
  function toast(text) {
    const t = document.getElementById('toast');
    t.textContent = text;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  function consumeToken() {
    const url = new URL(location.href);
    url.hash = '';
    url.searchParams.delete('t');
    history.replaceState(null, '', url.pathname + url.search);
  }
  function readToken() {
    const hash = location.hash.replace(/^#/, '');
    const hp = new URLSearchParams(hash);
    let t = hp.get('t');
    if (!t) {
      const qp = new URLSearchParams(location.search);
      t = qp.get('t');
    }
    return t ? t.trim().toLowerCase() : null;
  }

  function celebrate(stationIdx, isFinal) {
    const c = nodeScreenCenter(stationIdx);
    ringPulse(stationIdx);
    screenFlash(isFinal);
    if (c) spawnBurst(c.x, c.y, isFinal ? 30 : (stationIdx === 7 ? 24 : 16), isFinal || stationIdx === 7 ? '#f3d57f' : undefined);
    bumpCount();
    setTimeout(() => showFlash(stationIdx, isFinal), 620);
  }

  function applyToken(token) {
    const station = TOKENS[token];
    consumeToken();
    if (!station) { toast('neznámé znamení'); return; }
    if (progress.has(station)) {
      toast('znamení ' + station + ' už máš');
      return;
    }
    progress.add(station);
    saveProgress(currentName, progress);
    render();
    const isFinal = progress.size === STATIONS;
    celebrate(station, isFinal);
  }

  function makeEmbers() {
    const wrap = document.getElementById('embers');
    const n = Math.min(30, Math.max(16, Math.floor(window.innerWidth / 32)));
    for (let i = 0; i < n; i++) {
      const e = document.createElement('div');
      e.className = 'ember-particle';
      e.style.left = (Math.random() * 100) + '%';
      const sz = 2 + Math.random() * 4;
      e.style.width = sz + 'px';
      e.style.height = sz + 'px';
      e.style.animationDuration = (9 + Math.random() * 13) + 's';
      e.style.animationDelay = -(Math.random() * 22) + 's';
      e.style.setProperty('--dx', ((Math.random() - 0.5) * 140).toFixed(0) + 'px');
      wrap.appendChild(e);
    }
  }

  const helpBackdrop = document.getElementById('helpBackdrop');
  const helpModal = document.getElementById('helpModal');
  const codeInput = document.getElementById('codeInput');
  document.getElementById('helpCall').setAttribute('href', 'tel:' + EMERGENCY_TEL.replace(/\s+/g, ''));
  function openHelp() {
    helpBackdrop.classList.add('open');
    helpModal.classList.add('open');
    setTimeout(() => codeInput.focus(), 350);
  }
  function closeHelp() {
    helpBackdrop.classList.remove('open');
    helpModal.classList.remove('open');
    codeInput.value = '';
  }
  document.getElementById('helpBtn').addEventListener('click', openHelp);
  document.getElementById('helpClose').addEventListener('click', closeHelp);
  helpBackdrop.addEventListener('click', closeHelp);
  document.getElementById('codeForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const code = codeInput.value.trim();
    if (!/^\d{4}$/.test(code)) { toast('zadej 4-místný kód'); return; }
    closeHelp();
    applyToken(code);
  });

  document.getElementById('reset').addEventListener('click', () => {
    if (!confirm('Začít znovu? Ztratíš nasbíraná znamení a dostaneš nové jméno.')) return;
    localStorage.removeItem(SK.progress(currentName));
    localStorage.removeItem(SK.name);
    currentName = getOrCreateName();
    progress = loadProgress(currentName);
    render();
  });

  buildSvg();
  makeEmbers();
  currentName = getOrCreateName();
  progress = loadProgress(currentName);
  render();
  const tok = readToken();
  if (tok) applyToken(tok);
})();
</script>
</body>
</html>
